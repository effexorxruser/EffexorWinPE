name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: false
      - name: Test
        run: go test ./...
      - name: Cross-compile WinPE collector
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build -trimpath -o /tmp/anp-collector.exe ./cmd/anp-collector
      - name: Validate JSON files
        run: |
          jq empty contracts/diagnostic-report.schema.json
          jq empty manifests/tools.json
          jq empty manifests/drivers.json
          jq empty payload/ANP/config/client.example.json
