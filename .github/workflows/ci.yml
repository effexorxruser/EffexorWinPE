name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: false
      - name: Check Go formatting
        run: |
          unformatted="$(gofmt -l $(git ls-files '*.go'))"
          if [ -n "$unformatted" ]; then
            printf 'Unformatted Go files:\n%s\n' "$unformatted"
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Test with race detector
        run: go test -race ./...
      - name: Cross-compile EffexorWinPE executables
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -o /tmp/effexorwinpe-collector.exe ./cmd/effexorwinpe-collector
          go build -trimpath -o /tmp/effexorwinpe-agent.exe ./cmd/effexorwinpe-agent
      - name: Build Linux gateway
        run: go build -trimpath -o /tmp/effexorwinpe-gateway ./cmd/effexorwinpe-gateway
      - name: Build gateway container
        run: docker build -f deploy/gateway/Dockerfile -t effexorwinpe-gateway:test .
      - name: Validate JSON files
        run: |
          jq empty contracts/diagnostic-report.schema.json
          jq empty contracts/diagnosis.schema.json
          jq empty contracts/diagnostic-session.schema.json
          jq empty manifests/tools.json
          jq empty manifests/drivers.json
          jq empty manifests/image-payload.json
          jq empty payload/EffexorWinPE/config/client.example.json

  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: false
      - name: Test Windows implementation
        shell: pwsh
        run: ./build/Test-Repository.ps1
      - name: Build WinPE executables
        run: |
          go build -trimpath -o "$env:RUNNER_TEMP/effexorwinpe-collector.exe" ./cmd/effexorwinpe-collector
          go build -trimpath -o "$env:RUNNER_TEMP/effexorwinpe-agent.exe" ./cmd/effexorwinpe-agent
      - name: Collect, analyze, and validate report
        shell: pwsh
        run: |
          $reportPath = Join-Path $env:RUNNER_TEMP "diagnostic-report.json"
          & "$env:RUNNER_TEMP/effexorwinpe-collector.exe" --output $reportPath
          if ($LASTEXITCODE -ne 0) {
            throw "Collector failed with exit code $LASTEXITCODE"
          }
          $report = Get-Content $reportPath -Raw | ConvertFrom-Json
          if ($report.schema_version -ne "1.3.0") {
            throw "Unexpected schema version: $($report.schema_version)"
          }
          foreach ($section in @("hardware", "storage", "boot", "windows_installations", "checks", "privacy")) {
            if ($null -eq $report.$section) {
              throw "Missing report section: $section"
            }
          }
          if ($null -eq $report.storage.bitlocker_inventory -or $report.storage.bitlocker_inventory.status -notin @("ok", "partial", "unavailable")) {
            throw "Missing or invalid storage.bitlocker_inventory.status"
          }
          if ($report.storage.bitlocker_inventory.status -eq "unavailable" -and $null -ne $report.storage.bitlocker_volumes) {
            throw "Unavailable BitLocker inventory must use null bitlocker_volumes"
          }
          if ($report.storage.bitlocker_inventory.status -in @("ok", "partial") -and $null -eq $report.storage.bitlocker_volumes) {
            throw "Successful BitLocker inventory must include an explicit bitlocker_volumes array"
          }
          $diagnosisPath = Join-Path $env:RUNNER_TEMP "diagnosis.json"
          & "$env:RUNNER_TEMP/effexorwinpe-agent.exe" --input $reportPath --output $diagnosisPath
          if ($LASTEXITCODE -ne 0) {
            throw "Agent preflight failed with exit code $LASTEXITCODE"
          }
          $diagnosis = Get-Content $diagnosisPath -Raw | ConvertFrom-Json
          if ($diagnosis.schema_version -ne "0.2.0" -or $diagnosis.mode -ne "offline_preflight") {
            throw "Unexpected diagnosis contract or mode"
          }
          foreach ($section in @("findings", "questions", "next_steps", "limitations", "sources")) {
            if ($null -eq $diagnosis.$section) {
              throw "Missing diagnosis section: $section"
            }
          }
          foreach ($step in $diagnosis.next_steps) {
            if ($step.risk -ne "read_only" -or $step.requires_confirmation -ne $false) {
              throw "Offline preflight emitted a mutating operation"
            }
          }
          $sessionPath = Join-Path $env:RUNNER_TEMP "diagnosis-session.json"
          if (-not (Test-Path $sessionPath)) {
            throw "Agent did not create a diagnostic session"
          }
          $session = Get-Content $sessionPath -Raw | ConvertFrom-Json
          if ($session.schema_version -ne "0.2.0" -or $session.report_id -ne $report.report_id) {
            throw "Unexpected diagnostic session contract"
          }
