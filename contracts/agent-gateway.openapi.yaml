openapi: 3.1.0
info:
  title: EffexorWinPE Agent Gateway
  version: 0.3.0
  description: Narrow client boundary between EffexorWinPE rescue media and its model-backed agent service.
servers:
  - url: https://api.example.invalid/rescue/v1
paths:
  /diagnoses:
    post:
      summary: Request analysis of a technician-approved diagnostic session
      operationId: createDiagnosis
      security:
        - deviceToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [diagnostic_report, session, technician_approved]
              properties:
                diagnostic_report:
                  $ref: ./diagnostic-report.schema.json
                session:
                  $ref: ./diagnostic-session.schema.json
                technician_approved:
                  const: true
      responses:
        "202":
          description: Analysis accepted
          content:
            application/json:
              schema:
                type: object
                required: [diagnosis_id, status]
                properties:
                  diagnosis_id:
                    type: string
                  status:
                    const: queued
        "401":
          description: Device credential is missing, expired, or revoked
        "413":
          description: Diagnostic report exceeds the allowed size
  /diagnoses/{diagnosis_id}:
    get:
      summary: Read the current state or completed evidence-backed diagnosis
      operationId: getDiagnosis
      security:
        - deviceToken: []
      parameters:
        - name: diagnosis_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current analysis state
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [diagnosis_id, status]
                    properties:
                      diagnosis_id: { type: string }
                      status: { enum: [queued, running] }
                  - allOf:
                      - $ref: ./diagnosis.schema.json
                      - type: object
                        properties:
                          mode: { const: online_agent }
        "401":
          description: Device credential is missing, expired, or revoked
        "404":
          description: Diagnosis does not exist or does not belong to this device
components:
  securitySchemes:
    deviceToken:
      type: http
      scheme: bearer
      bearerFormat: opaque-device-token
